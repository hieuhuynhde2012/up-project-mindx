<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập - EduQuiz Hub</title>
  <link rel="stylesheet" href="./styles/main.css" />
  <link rel="stylesheet" href="./styles/auth.css" />
</head>
<body>
  <div id="siteHeader"></div>
  <main class="auth-page">
    <div class="container auth-grid">
      <section class="auth-side card">
        <span class="kicker">Chào mừng trở lại</span>
        <h1>Đăng nhập để lưu tiến độ học tập</h1>
        <p>Lưu lịch sử làm bài, xem lại kết quả và sử dụng chat box gợi ý bài tập theo nhu cầu học tập cá nhân.</p>
      </section>
      <section class="auth-card card">
        <h2>Đăng nhập</h2>
        <form id="loginForm" class="auth-form">
          <div class="form-group">
            <label>Email</label>
            <input id="email" type="email" required />
          </div>
          <div class="form-group">
            <label>Mật khẩu</label>
            <input id="password" type="password" required />
          </div>
          <button type="submit" class="btn btn-primary btn-block">Đăng nhập</button>
        </form>
        <p class="auth-note">Chưa có tài khoản? <a href="./register.html">Đăng ký ngay</a></p>
        <div id="authMessage"></div>
      </section>
    </div>
  </main>
  <div id="siteFooter"></div>
  <div id="toast" class="toast"></div>
  <script type="module" src="./scripts/login.js"></script>
</body>
</html>
